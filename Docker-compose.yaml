name: meropriyatus
services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  app:
    build: ./meropriyatus
    restart: always
    container_name: app
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./app_data:/var/lib/app/
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  app_data: