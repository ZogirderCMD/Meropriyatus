name: meropriyatus
services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
  app:
    build: ./meropriyatus
    restart: always
    container_name: app
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"
