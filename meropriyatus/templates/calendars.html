<html>
    <meta charset="UTF-8">
    <head>
        <title id="user">Календари пользователя</title>
    </head>
    <link rel="stylesheet" href="/static/styles/style.css">
    <body>
        <table>
            <th id="list" align="left">
                <button id="createCalendar">Создать календарь</button><br>
                <div id="creationCalendar"></div><div id="creationResponse"></div><br>
                <a href="/user"><button>Акканут</button></a><br>
                <table border="5px" id="calendars">

                </table>
            </th>
            <th id="content" align="left">
                <button id="back">Обратно</button><br>
                <h3 id="titlecal">Заголовок</h3>
                <table border="5px" id="calendarr">
                </table><br>
                <button id="bac">Назад</button><button id="forwr">Вперёд</button>
            </th>
            <th id="events" align="left">
                <button id="bacсk">Обратно</button><br>
                <h3 id="titlecal">Мероприятия на день</h3>
                <table border="5px" id="eventsCal">
                </table><br>
            </th>
        </table>
        <script>
            
            dt = new Date()
            let yearM = dt.getFullYear()
            let monthM = dt.getMonth()
            let calUID = "00000000"

            let cracal = 0

            async function showEventsOnDay(enddate) {
                document.getElementById("eventsCal").textContent = ''
                resp = await enter()
                for (let i=0; i < resp.events.length; i++) {
                    cal = resp.events[i].calendar
                    ev_enddate = resp.events[i].date
                    if (cal == calUID && ev_enddate == enddate) {
                        name = resp.events[i].name
                        desc = resp.events[i].description

                        tr = document.createElement("tr")

                        th = document.createElement("th")

                        det = document.createElement("details")

                        sum = document.createElement("summary")
                        sum.textContent = name

                        txt = document.createElement("label")
                        txt.textContent = desc

                        det.appendChild(sum)
                        det.appendChild(txt)

                        th.appendChild(det)

                        th.length="120px"
                        th.setAttribute("align", "left")

                        tr.appendChild(th)

                        document.getElementById("eventsCal").appendChild(tr)
                    }
                }
                console.log("")
            }

            async function switchCreateCalendar() {
                if (cracal == 0) {
                    cracal = 1
                    await show()
                } else {
                    cracal = 0
                    await hide()
                }
                
            }

            async function show() {
                await hide()
                    
                document.getElementById("creationCalendar").appendChild(document.createElement("br"))

                nameInput = document.createElement("input")
                nameInput.id = "name"
                document.getElementById("creationCalendar").appendChild(nameInput)

                document.getElementById("creationCalendar").appendChild(document.createElement("br"))

                but = document.createElement("button")
                but.id = "create"
                but.textContent = "Создать"
                document.getElementById("creationCalendar").appendChild(but)


                document.getElementById("create").addEventListener("click", async () =>  {
                        await createCalendar()
                    }
                )

            }
            async function hide() {
                document.getElementById("creationCalendar").textContent = ""
            }
            
            async function createCalendar() {
                const formData = new FormData()
                    
                formData.append("name", document.getElementById("name").value);

                const response = await fetch("/api/user/calendar", {
                        method: "POST",
                        body: formData,
                        credentials: "include"
                    }
                )
                result = await response.json()
                if (!response.ok) {
                    document.getElementById("creationResponse").textContent = result.message
                } else {
                    await reset()
                    await hide()
                }
            }
            async function changeCalendar(uid) {
                but = document.getElementById(uid+"button")
                if (but.textContent == "Изменить") {
                    t = document.getElementById(uid)
                    a = document.createElement("input")
                    a.id = uid+"input"
                    a.value = t.textContent
                    a.size = t.textContent.length
                    t.textContent = ''
                    t.appendChild(a)
                    but.textContent = "Сохранить"
                } else {
                    const formData = new FormData()
                        
                    formData.append("uid", uid);
                    formData.append("name", document.getElementById(uid+"input").value);

                    const response = await fetch("/api/user/calendar", {
                            method: "PATCH",
                            body: formData,
                            credentials: "include"
                        }
                    )
                    result = await response.json()
                    document.getElementById("creationResponse").textContent = ""
                    if (!response.ok) {
                        document.getElementById("creationResponse").textContent = result.message
                    }
                    await reset()
                }
            }
            async function removeCalendar(uid) {
                const formData = new FormData()
                    
                formData.append("uid", uid);

                const response = await fetch("/api/user/calendar", {
                        method: "DELETE",
                        body: formData,
                        credentials: "include"
                    }
                )
                await reset()
            }
            async function chEvent(uid, value) {
                el = document.getElementById(uid)
                el.textContent = value
            }
            async function showCalendar() {
                ndt = new Date(yearM, monthM+1, 0)
                days = ndt.getDate()
                const nmonths = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"]
                document.getElementById("titlecal").textContent = `${ndt.getFullYear()} ${nmonths[ndt.getMonth()]}`
                table = document.getElementById("calendarr")
                table.textContent = ""
                resp = await enter()
                events_dict = resp.events

                ttday = (new Date(yearM,monthM,1).getDay()+6)%7
                cc = 0
                if (ttday > 0) { 
                    let tr = document.createElement("tr")
                    for (let i = 0; i < ttday; i++) {
                        let th = document.createElement("th")
                        th.classList.add("calendar")
                        th.style.visibility = 'hidden'
                        tr.appendChild(th)
                    }
                    for (let i = 0; i < 7-ttday; i++) {
                        cc++
                        let th = document.createElement("th")
                        th.textContent = cc.toString()
                        let str_monthM = String(monthM+1)
                        let str_cc = String(cc)
                        if (str_monthM.length < 2) {str_monthM="0"+str_monthM}
                        if (str_cc.length < 2) {str_cc="0"+str_cc}
                        let enddate = `${yearM}-${str_monthM}-${str_cc}`
                        th.classList.add("calendar")
                        th.id = enddate

                        let gday = (new Date(yearM,monthM,cc).getDay()+6)%7
                        if (gday >= 5) { th.setAttribute("bgcolor", "tomato") }

                        tr.appendChild(th)
                    }
                    table.appendChild(tr)
                }


                var c = cc

                for (let y = 0; y<6; y++) {
                    let tr = document.createElement("tr")
                    for (let x = 0; x<7; x++) {
                        c++
                        if (c < days+1) {
                            let th = document.createElement("th")
                            th.textContent = c.toString()
                            let str_monthM = String(monthM+1)
                            let str_c = String(c)
                            if (str_monthM.length < 2) {str_monthM="0"+str_monthM}
                            if (str_c.length < 2) {str_c="0"+str_c}
                            let enddate = `${yearM}-${str_monthM}-${str_c}`
                            th.classList.add("calendar")
                            th.id = enddate

                            let gday = (new Date(yearM,monthM,c).getDay()+6)%7
                            if (gday >= 5) { th.setAttribute("bgcolor", "tomato") }


                            tr.appendChild(th)
                        }
                    }
                    table.appendChild(tr)

                }

                used_dats = []

                for (let i = 0; i<events_dict.length; i++) {


                    cal = events_dict[i].calendar
                    let date = events_dict[i].date
                    name = events_dict[i].name

                    thh = document.getElementById(date)
                    if (cal == calUID && thh != null && !used_dats.includes(date) ) {
                        used_dats.push(date)
                        thh.setAttribute("bgcolor", "orange")
                        thh.addEventListener("click", async () => {
                            document.getElementById("content").style.display = 'none'
                            document.getElementById("events").style.display = 'block'
                            document.getElementById("list").style.display = 'none'
                            await showEventsOnDay(date)
                        })
                    }
                }

                ttdate = new Date()
                tmonth = String(ttdate.getMonth()+1)
                tday = String(ttdate.getDate())
                if (tmonth.length < 2) {tmonth="0"+tmonth}
                if (tday.length < 2) {tday="0"+str_c}
                edate = `${ttdate.getFullYear()}-${tmonth}-${tday}`

                tth = document.getElementById(edate)
                if (tth.getAttribute("bgcolor") == "orange") { tth.setAttribute("bgcolor", "cyan") }
                else { tth.setAttribute("bgcolor", "lime") }


            }

            async function switchAccessButton(button, chbox) {
                document.getElementById(button).disabled = document.getElementById(chbox).checked
            }

            async function switchAccessCalendar(calendar, chebox) {

                chbox = document.getElementById(chebox)
                
                const formData = new FormData()
                            
                formData.append("uid", calendar);
                formData.append("access", !chbox.checked);

    
                const response = await fetch("/api/user/calendar/access", {
                        method: "POST",
                        body: formData,
                        credentials: "include"
                        }
                )
            }

            async function reset() {

                table = document.getElementById("calendars")
                table.textContent = ""

                let tr = document.createElement("tr")
                
                th = document.createElement("th")
                th.textContent = "name"
                tr.appendChild(th)
                
                th = document.createElement("th")
                th.textContent = "actions"
                tr.appendChild(th)

                table.appendChild(tr)

                resp = await enter()

                for (let i = 0; i<resp.calendars.length; i++) {
                    
                    tr = document.createElement("tr")

                    th = document.createElement("th")
                    th.textContent = resp.calendars[i].name
                    th.id = resp.calendars[i].uid
                    tr.appendChild(th)

                    th = document.createElement("th")

                    but = document.createElement("button")
                    but.textContent = "Удалить"

                    but.addEventListener("click", async () =>  {
                            await removeCalendar(resp.calendars[i].uid)
                        }
                    )

                    th.appendChild(but)

                    but = document.createElement("button")
                    but.textContent = "Изменить"
                    but.id = resp.calendars[i].uid+"button"

                    but.addEventListener("click", async () =>  {
                            await changeCalendar(resp.calendars[i].uid)
                        }
                    )

                    th.appendChild(but)

                    but = document.createElement("button")
                    but.textContent = "Посмотреть"
                    but.id = resp.calendars[i].uid+"show"

                    but.addEventListener("click", async () =>  {
                            document.getElementById("content").style.display = 'block'
                            document.getElementById("list").style.display = 'none'
                            calUID = resp.calendars[i].uid
                            await showCalendar()
                        }
                    )

                    th.appendChild(but)
                    
                    div = document.createElement("div")

                    chbox = document.createElement("input")
                    chbox.type = "checkbox"
                    chbox.id = `chbox${resp.calendars[i].uid}`
                    chbox.checked = resp.calendars[i].accessible

                    labl = document.createElement("label")
                    labl.textContent = "Публичный"

                    th.appendChild(chbox)
                    th.appendChild(labl)

                    // th.appendChild(div)
                    
                    but1 = document.createElement("button")
                    but1.textContent = "Ссылка"
                    but1.disabled = !resp.calendars[i].accessible
                    but1.id = `access${resp.calendars[i].uid}`

                    th.appendChild(but1)

                    chbox.addEventListener("mousedown", async () =>  {  
                            await switchAccessButton(`access${resp.calendars[i].uid}`,`chbox${resp.calendars[i].uid}` )
                            await switchAccessCalendar(resp.calendars[i].uid, `chbox${resp.calendars[i].uid}`)

                        }
                    )

                    but1.addEventListener("mousedown", async () =>  {
                            if (!but.disabled) { 
                                inputValue = `${window.location.protocol}//${window.location.host}/calendar/${resp.calendars[i].uid}`
                                await navigator.clipboard.writeText(inputValue)
                            }
                        }
                    )

                    tr.appendChild(th)

                    table.appendChild(tr)
                }

            }
            async function enter() {
                const response = await fetch("/api/user", {
                        method: "GET",
                        credentials: "include"
                    }
                )
                if (!response.ok) {
                    window.location.replace("/login")
                } else {
                    let resp = await response.json()
                    document.getElementById("user").textContent = `Календари ${resp.username}`
                    return resp
                }
            }
             
            document.getElementById("createCalendar").addEventListener("click", async () =>  {
                    await switchCreateCalendar()
                }
            )
            document.getElementById("back").addEventListener("click", async () =>  {
                    document.getElementById("content").style.display = 'none'
                    document.getElementById("events").style.display = 'none'
                    document.getElementById("list").style.display = 'block'
                }
            )
            document.getElementById("bacсk").addEventListener("click", async () =>  {
                    document.getElementById("content").style.display = 'block'
                    document.getElementById("events").style.display = 'none'
                    document.getElementById("list").style.display = 'none'
                    await showCalendar()
                }
            )
            document.getElementById("forwr").addEventListener("click", async () =>  {
                    monthM++
                    await showCalendar()
                }
            )
            document.getElementById("bac").addEventListener("click", async () =>  {
                    monthM--
                    await showCalendar()
                }
            )
            document.getElementById("content").style.display = 'none'
            document.getElementById("events").style.display = 'none'
            reset()
        </script>
    </body>
</html>
